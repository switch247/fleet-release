services:
  w1-t1-ti1-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleetlease
      POSTGRES_PASSWORD: fleetlease
      POSTGRES_DB: fleetlease
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetlease"]
      interval: 10s
      timeout: 5s
      retries: 5

  w1-t1-ti1-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8080"
      JWT_SECRET: "dev-secret-change-me"
      AES256_KEY: "01234567890123456789012345678901"
      ADMIN_ALLOWLIST: "127.0.0.1/32,::1/128,172.16.0.0/12"
      TRUSTED_PROXIES: ""
      ALLOW_INSECURE_HTTP_CIDRS: "127.0.0.1/32,::1/128,172.16.0.0/12"
      ATTACHMENT_DIR: "/app/data/attachments"
      ATTACHMENT_SIGNING_SECRET: "dev-secret-change-me"
      STORE_BACKEND: "postgres"
      DATABASE_URL: "postgres://fleetlease:fleetlease@w1-t1-ti1-db:5432/fleetlease?sslmode=disable"
      BACKUP_RETENTION_DAYS: "30"
      ATTACHMENT_RETENTION_DAYS: "365"
      LEDGER_RETENTION_YEARS: "7"
      NOTIFICATION_RETRY_MAX: "3"
      NOTIFICATION_RETRY_BACKOFF_SECONDS: "30"
      REQUIRE_ADMIN_MFA: "true"
      RETENTION_PURGE_INTERVAL_MINUTES: "1440"
    ports:
      - "8080:8080"
    depends_on:
      w1-t1-ti1-db:
        condition: service_healthy

  w1-t1-ti1-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: "http://localhost:8080/api/v1"
      API_BASE_URL: "http://w1-t1-ti1-backend:8080"
    ports:
      - "5173:5173"
    depends_on:
      - w1-t1-ti1-backend

volumes:
  pg_data:
