services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleetlease
      POSTGRES_PASSWORD: fleetlease
      POSTGRES_DB: fleetlease
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8080"
      JWT_SECRET: "dev-secret-change-me"
      AES256_KEY: "01234567890123456789012345678901"
      ADMIN_ALLOWLIST: "127.0.0.1/32,::1/128,172.16.0.0/12"
      TRUSTED_PROXIES: ""
      ALLOW_INSECURE_HTTP_CIDRS: "127.0.0.1/32,::1/128,172.16.0.0/12"
      ATTACHMENT_DIR: "/app/data/attachments"
      ATTACHMENT_SIGNING_SECRET: "dev-secret-change-me"
      STORE_BACKEND: "postgres"
      DATABASE_URL: "postgres://fleetlease:fleetlease@db:5432/fleetlease?sslmode=disable"
      BACKUP_RETENTION_DAYS: "30"
      ATTACHMENT_RETENTION_DAYS: "365"
      LEDGER_RETENTION_YEARS: "7"
      NOTIFICATION_RETRY_MAX: "3"
      NOTIFICATION_RETRY_BACKOFF_SECONDS: "30"
      REQUIRE_ADMIN_MFA: "true"
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: "http://localhost:8080/api/v1"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  test:
    image: golang:1.23-alpine
    working_dir: /app
    command: ["sh", "./run_tests.sh"]
    volumes:
      - ./:/app

volumes:
  pg_data:
