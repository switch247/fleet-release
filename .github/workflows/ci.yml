name: FleetLease CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleetlease
          POSTGRES_PASSWORD: fleetlease
          POSTGRES_DB: fleetlease
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetlease -d fleetlease"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://fleetlease:fleetlease@localhost:5432/fleetlease?sslmode=disable
      TEST_STORE_BACKEND: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Backend tests
        working-directory: backend
        run: |
          go mod tidy
          go test ./...

      - name: Critical coverage gate (>90%)
        working-directory: backend
        run: |
          go test ./internal/services ./internal/logger -coverprofile=coverage-critical.out
          total=$(go tool cover -func=coverage-critical.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Critical coverage: ${total}%"
          awk "BEGIN {exit !(${total} >= 90)}"

      - name: Integration/API/security tests
        working-directory: tests
        run: |
          go mod tidy
          go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
